name: Release

on:
  workflow_run:
    workflows: ["Lint", "Security", "Test"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
      - name: Verify all required workflows passed
        if: github.event_name != 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HEAD_SHA="${{ github.event.workflow_run.head_sha }}"
          REPO="${{ github.repository }}"
          REQUIRED=("Lint" "Security" "Test")
          for wf in "${REQUIRED[@]}"; do
            STATUS=$(gh api "repos/${REPO}/actions/workflows" --jq ".workflows[] | select(.name==\"${wf}\") | .id" | head -1)
            CONCLUSION=$(gh api "repos/${REPO}/actions/workflows/${STATUS}/runs?head_sha=${HEAD_SHA}&per_page=1" --jq '.workflow_runs[0].conclusion')
            if [[ "${CONCLUSION}" != "success" ]]; then
              echo "Required workflow '${wf}' has not succeeded for commit ${HEAD_SHA} (status: ${CONCLUSION}). Skipping release."
              exit 1
            fi
          done
          echo "All required workflows passed for ${HEAD_SHA}."
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  setup-smoke-test:
    name: Setup Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build test container
        run: docker build -f test/Dockerfile.test -t openclaw-test .
      - name: Run setup smoke test
        run: docker run --rm --privileged openclaw-test
